
<!DOCTYPE html>
<html>
<head>
<title>Player Viewer</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<style>
body{font-family:Arial;padding:20px;}
.card{border:1px solid #ccc;padding:15px;border-radius:8px;}
.label{font-weight:bold;}
</style>
</head>
<body>
<h2>Player Information</h2>
<div id='out'>Loading...</div>
<script>
const p=new URLSearchParams(window.location.search).get('id');
fetch('players.csv').then(r=>r.text()).then(t=>{
 let rows=t.split(/?
/).map(r=>r.split(','));
 let head=rows[0];
 let idx=head.indexOf('ID');
 let rec=rows.find(r=>r[idx]===p);
 if(!rec){document.getElementById('out').innerHTML='No data';return;}
 let html='<div class="card">';
 head.forEach((h,i)=>{html+=`<p><span class='label'>${h}:</span> ${rec[i]}</p>`});
 html+='</div>';
 document.getElementById('out').innerHTML=html;
});
</script>
</body>
</html>
