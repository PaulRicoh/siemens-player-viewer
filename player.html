<!DOCTYPE html>
<html>
<head>
  <title>Player Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial;padding:20px;}
    .card{border:1px solid #ccc;padding:15px;border-radius:8px;}
    .label{font-weight:bold;}
  </style>
</head>
<body>

<h2>Player Information</h2>
<div id="out">Loading...</div>

<script>
  // Get id from query string, e.g. ?id=123
  const idParam = new URLSearchParams(window.location.search).get('id');

  // If no id at all, show a simple instruction and stop
  if (!idParam) {
    document.getElementById('out').innerHTML = "No ID provided in the URL. Try ?id=1";
  } else {
    fetch('players_clean.csv')
      .then(r => r.text())
      .then(t => {
        // Split into lines (handle \r\n or \n), drop a possible trailing empty line
        let rows = t.split(/\r?\n/);
        if (rows.length && rows[rows.length - 1].trim() === '') rows.pop();

        // Split into lines (handle \r\n or \n), drop a possible trailing empty line
        let rows = t.split(/\r?\n/);
        if (rows.length && rows[rows.length - 1].trim() === '') rows.pop();

        // Split each line into columns
        rows = rows.map(r => r.split(','));

        // Headers (strip BOM if present on first cell)
        let head = rows[0].map(h => h.replace(/\uFEFF/g, ''));
        let idx  = head.indexOf("ID");
        if (idx === -1) {
          document.getElementById('out').innerHTML = "CSV header missing ID column.";
          return;
        }

        // Render a simple key/value card
        let html = "<div class='card'>";
        head.forEach((h, i) => {
          html += `<p><span class='label'>${h}:</span> ${rec[i] ?? ""}</p>`;
        });
        html += "</div>";

        document.getElementById('out').innerHTML = html;
      })
      .catch(err => {
        document.getElementById('out').innerHTML = "Error loading CSV.";
        console.error(err);
      });
  }
</script>

</body>
</html>
